# Passwords and API keys come from the environment (.env) with dev-only
# fallbacks. For any non-local deployment set POSTGRES_PASSWORD / NEO4J_PASSWORD
# and, if exposing the API, AUTH_ENABLED=true + API_KEYS=<comma-separated>.

x-api-env: &api-env
  POSTGRES_DSN: postgresql+psycopg://evomind:${POSTGRES_PASSWORD:-evomind}@postgres:5432/evomind
  REDIS_URL: redis://redis:6379/0
  QDRANT_URL: http://qdrant:6333
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-evomind123}
  PRIMARY_PROVIDER: ${PRIMARY_PROVIDER:-nvidia}
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-nvidia}
  NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
  NVIDIA_BASE_URL: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
  NVIDIA_MODEL: ${NVIDIA_MODEL:-deepseek-ai/deepseek-v4-pro}
  NVIDIA_EMBEDDING_MODEL: ${NVIDIA_EMBEDDING_MODEL:-nvidia/nv-embedqa-e5-v5}
  NVIDIA_THINKING: ${NVIDIA_THINKING:-true}
  NVIDIA_REASONING_EFFORT: ${NVIDIA_REASONING_EFFORT:-max}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  LLAMAPARSE_API_KEY: ${LLAMAPARSE_API_KEY:-}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
  CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.55}
  # Security (off by default — see header)
  AUTH_ENABLED: ${AUTH_ENABLED:-false}
  API_KEYS: ${API_KEYS:-}
  CORS_ORIGINS: ${CORS_ORIGINS:-*}
  MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-50}
  RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: evomind
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evomind}
      POSTGRES_DB: evomind
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: ["5432:5432"]
    mem_limit: 1g
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evomind"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.12.0
    restart: unless-stopped
    ports: ["6333:6333", "6334:6334"]
    volumes:
      - qdrantdata:/qdrant/storage
    mem_limit: 1g
    cpus: 1.0
    # NOTE: the qdrant image ships no curl/wget, so there is no reliable
    # in-container HTTP healthcheck; the API depends on it with service_started.

  neo4j:
    image: neo4j:5.20
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-evomind123}
      NEO4J_PLUGINS: '["apoc"]'
    ports: ["7474:7474", "7687:7687"]
    volumes:
      - neo4jdata:/data
    mem_limit: 1536m
    cpus: 1.0
    healthcheck:
      # cypher-shell ships inside the official image.
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-evomind123} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    environment:
      <<: *api-env
    volumes:
      - ./data:/app/data
    ports: ["8000:8000"]
    mem_limit: 2g
    cpus: 2.0
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      qdrant:   { condition: service_started }
      neo4j:    { condition: service_healthy }

  worker:
    build:
      context: ./apps/api
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery worker --loglevel=info --concurrency=2
    environment:
      <<: *api-env
    volumes:
      - ./data:/app/data
    mem_limit: 2g
    cpus: 2.0
    depends_on:
      api: { condition: service_started }

  beat:
    build:
      context: ./apps/api
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery beat --loglevel=info
    environment:
      <<: *api-env
    mem_limit: 512m
    cpus: 0.5
    depends_on:
      api: { condition: service_started }

  web:
    build:
      context: ./apps/web
    restart: unless-stopped
    environment:
      # used by next.config.mjs rewrites — must be reachable from the web container
      NEXT_PUBLIC_API_URL: http://api:8000
    ports: ["3000:3000"]
    mem_limit: 1g
    cpus: 1.0
    depends_on:
      api: { condition: service_started }

volumes:
  pgdata:
  qdrantdata:
  neo4jdata:
