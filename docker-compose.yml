version: "3.9"

x-api-env: &api-env
  POSTGRES_DSN: postgresql+psycopg://evomind:evomind@postgres:5432/evomind
  REDIS_URL: redis://redis:6379/0
  QDRANT_URL: http://qdrant:6333
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: evomind123
  PRIMARY_PROVIDER: ${PRIMARY_PROVIDER:-nvidia}
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-nvidia}
  NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
  NVIDIA_BASE_URL: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
  NVIDIA_MODEL: ${NVIDIA_MODEL:-deepseek-ai/deepseek-v4-pro}
  NVIDIA_EMBEDDING_MODEL: ${NVIDIA_EMBEDDING_MODEL:-nvidia/nv-embedqa-e5-v5}
  NVIDIA_THINKING: ${NVIDIA_THINKING:-true}
  NVIDIA_REASONING_EFFORT: ${NVIDIA_REASONING_EFFORT:-max}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  LLAMAPARSE_API_KEY: ${LLAMAPARSE_API_KEY:-}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
  CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.55}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: evomind
      POSTGRES_PASSWORD: evomind
      POSTGRES_DB: evomind
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evomind"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.12.0
    ports: ["6333:6333", "6334:6334"]
    volumes:
      - qdrantdata:/qdrant/storage

  neo4j:
    image: neo4j:5.20
    environment:
      NEO4J_AUTH: neo4j/evomind123
      NEO4J_PLUGINS: '["apoc"]'
    ports: ["7474:7474", "7687:7687"]
    volumes:
      - neo4jdata:/data

  api:
    build:
      context: ./apps/api
    environment:
      <<: *api-env
    volumes:
      - ./data:/app/data
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      qdrant:   { condition: service_started }
      neo4j:    { condition: service_started }

  worker:
    build:
      context: ./apps/api
    command: celery -A app.workers.celery_app.celery worker --loglevel=info --concurrency=2
    environment:
      <<: *api-env
    volumes:
      - ./data:/app/data
    depends_on:
      api: { condition: service_started }

  beat:
    build:
      context: ./apps/api
    command: celery -A app.workers.celery_app.celery beat --loglevel=info
    environment:
      <<: *api-env
    depends_on:
      api: { condition: service_started }

  web:
    build:
      context: ./apps/web
    environment:
      # used by next.config.mjs rewrites — must be reachable from the web container
      NEXT_PUBLIC_API_URL: http://api:8000
    ports: ["3000:3000"]
    depends_on:
      api: { condition: service_started }

volumes:
  pgdata:
  qdrantdata:
  neo4jdata:
