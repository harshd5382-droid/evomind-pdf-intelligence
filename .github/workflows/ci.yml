name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  web:
    name: Web (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      # `next build` type-checks the whole app.
      - name: Build
        run: npm run build

  api:
    name: API (lint + type-check + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app tests

      # Type-checking is advisory while the codebase is annotated incrementally;
      # it reports problems without failing the build yet.
      - name: Type-check (mypy)
        run: mypy app
        continue-on-error: true

      - name: Tests (pytest + coverage)
        # Coverage floor starts low and should be ratcheted up over time.
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=30

      # Dependency CVE scan is advisory — transitive advisories shouldn't block
      # a feature PR, but we want them visible in the log.
      - name: Dependency audit (pip-audit)
        run: pip-audit || true
        continue-on-error: true
