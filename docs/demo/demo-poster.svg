<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 512" width="820" height="512" role="img" aria-label="EvoMind demo placeholder — generate the live GIF with make demo-gif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#030913"/>
      <stop offset="1" stop-color="#071427"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C9A227"/>
      <stop offset="1" stop-color="#E7C65A"/>
    </linearGradient>
  </defs>
  <rect width="820" height="512" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="819" height="511" fill="none" stroke="#1B3257" stroke-width="1"/>
  <!-- pipeline strip -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#7A9BBE" letter-spacing="1">
    <text x="60"  y="96">INGEST</text>
    <text x="188" y="96">QUESTION</text>
    <text x="332" y="96">SOLVE</text>
    <text x="452" y="96">REFLECT</text>
    <text x="576" y="96">SYNTHESIZE</text>
    <text x="720" y="96">SCORE</text>
  </g>
  <g stroke="#3D5A7A" stroke-width="1">
    <line x1="130" y1="92" x2="180" y2="92"/>
    <line x1="268" y1="92" x2="324" y2="92"/>
    <line x1="380" y1="92" x2="444" y2="92"/>
    <line x1="516" y1="92" x2="568" y2="92"/>
    <line x1="672" y1="92" x2="712" y2="92"/>
  </g>
  <!-- title -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" text-anchor="middle">
    <circle cx="410" cy="228" r="46" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <circle cx="410" cy="228" r="46" fill="none" stroke="#C9A227" stroke-width="2"
            stroke-dasharray="216 289" stroke-linecap="round" transform="rotate(-90 410 228)"/>
    <text x="410" y="235" font-size="30" fill="#DCE8F5">🧠</text>
    <text x="410" y="332" font-size="26" font-weight="700" fill="#DCE8F5">EvoMind — live demo</text>
    <text x="410" y="366" font-size="14" fill="#7A9BBE">Drop a PDF → it asks its own questions → solves them → grows a graph</text>
  </g>
  <!-- CTA -->
  <g text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <rect x="286" y="404" width="248" height="40" rx="2" fill="none" stroke="#C9A227" stroke-width="1"/>
    <text x="410" y="429" font-size="14" fill="#C9A227">▶  make demo-gif</text>
    <text x="410" y="474" font-size="11" fill="#3D5A7A">placeholder — generates the real capture at docs/demo/demo.gif</text>
  </g>
</svg>
